version: "3.8"

services:
  clamav:
    image: clamav/clamav:latest
    container_name: tillforge-repository-clamav
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - /data/tillforge-repo/storage:/data/storage
      - /data/tillforge-repo/clamav:/var/lib/clamav
    restart: unless-stopped
    networks:
      - repository_internal
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: tillforge-repository-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-repository}
      - POSTGRES_USER=${POSTGRES_USER:-repo_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - /data/tillforge-repo/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repo_user} -d ${POSTGRES_DB:-repository}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - repository_internal
    security_opt:
      - no-new-privileges:true

  repository:
    image: ${REPO_IMAGE:-ghcr.io/tillforge/tillforge-repository:latest}
    container_name: tillforge-repository
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_started
    ports:
      - "${REPO_BIND_ADDRESS:-127.0.0.1}:${REPO_PORT:-8001}:8001"
      - "${SYNC_BIND_ADDRESS:-127.0.0.1}:${SYNC_API_PORT:-9001}:9001"
    environment:
      - REPO_NAME=${REPO_NAME:-Tillforge Repository Server}
      - REPO_HOST=0.0.0.0
      - REPO_PORT=8001
      - SYNC_API_PORT=9001
      - SYNC_SSL_ENABLED=${SYNC_SSL_ENABLED:-${REPO_SSL_ENABLED:-false}}
      - SYNC_SSL_CERT_PATH=${SYNC_SSL_CERT_PATH:-${REPO_SSL_CERT_PATH:-/data/ssl/localhost.crt}}
      - SYNC_SSL_KEY_PATH=${SYNC_SSL_KEY_PATH:-${REPO_SSL_KEY_PATH:-/data/ssl/localhost.key}}
      - REPO_DEBUG=${REPO_DEBUG:-false}
      - REPO_STORAGE_PATH=/data/storage
      - REPO_DATABASE_PATH=/data/database/repository.db
      - REPO_DB_BACKEND=${REPO_DB_BACKEND:-postgresql}
      - REPO_DATABASE_URL=${REPO_DATABASE_URL:-postgresql://${POSTGRES_USER:-repo_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-repository}}
      - REPO_MAX_FILE_SIZE=${REPO_MAX_FILE_SIZE:-524288000}
      - REPO_ADMIN_API_KEY=${REPO_ADMIN_API_KEY:-}
      - SYNC_API_SHARED_SECRET=${SYNC_API_SHARED_SECRET:-}
      - REPO_PUBLIC_ACCESS=${REPO_PUBLIC_ACCESS:-false}
      - REPO_RATE_LIMIT=${REPO_RATE_LIMIT:-100}
      - REPO_SSL_ENABLED=${REPO_SSL_ENABLED:-false}
      - REPO_SSL_CERT_PATH=${REPO_SSL_CERT_PATH:-}
      - REPO_SSL_KEY_PATH=${REPO_SSL_KEY_PATH:-}
      - REPO_SSL_DIR=/data/ssl
      - CERTBOT_AUTO_RENEW=${CERTBOT_AUTO_RENEW:-true}
      - CERTBOT_RENEW_INTERVAL_SECONDS=${CERTBOT_RENEW_INTERVAL_SECONDS:-21600}
      - CERTBOT_RENEW_STARTUP_DELAY_SECONDS=${CERTBOT_RENEW_STARTUP_DELAY_SECONDS:-120}
      - CERTBOT_AUTO_RESTART_ON_RENEW=${CERTBOT_AUTO_RESTART_ON_RENEW:-true}
      - CLAMAV_TCP_HOST=${CLAMAV_TCP_HOST:-clamav}
      - CLAMAV_TCP_PORT=${CLAMAV_TCP_PORT:-3310}
      - CLAMAV_SCAN_TARGET_HOST=${CLAMAV_SCAN_TARGET_HOST:-/data/tillforge-repo/storage}
      - CLAMAV_SCAN_TIMEOUT_SECONDS=${CLAMAV_SCAN_TIMEOUT_SECONDS:-1800}
      - CLAMAV_AUTO_SCAN=${CLAMAV_AUTO_SCAN:-false}
      - CLAMAV_AUTO_SCAN_INTERVAL_SECONDS=${CLAMAV_AUTO_SCAN_INTERVAL_SECONDS:-21600}
      - REPO_DESCRIPTION=${REPO_DESCRIPTION:-Package repository for your platform}
      - REPO_CONTACT=${REPO_CONTACT:-admin@poscmdb.local}
      - SYNC_DB_BACKEND=${SYNC_DB_BACKEND:-postgresql}
      - SYNC_DATABASE_URL=${SYNC_DATABASE_URL:-postgresql://${POSTGRES_USER:-repo_user}:${POSTGRES_PASSWORD}@postgres:5432/${SYNC_DB_NAME:-pos_cmdb}}
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - /data/tillforge-repo:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - repository_internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  repository_internal:
    driver: bridge
